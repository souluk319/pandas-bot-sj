apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    # 사용할 태스크들을 명시합니다.
    pipelinesascode.tekton.dev/task: "[git-clone, buildah]" 
  name: build-and-push
spec:
  params:
  - name: repo_url
    value: '{{ repo_url }}'
  - name: revision
    value: '{{ revision }}'
  # 빌드될 이미지 주소 (demo 네임스페이스 기준)
  - name: image_url
    value: "registry.ocp.test.com:5000/demo/pandas-bot:latest"
    #"registry.ocp.test.com:5000/demo/pandas-bot:latest"
  pipelineSpec:
    params:
    - name: repo_url
    - name: revision
    - name: image_url
    tasks:
    - name: fetch-repository
      params:
      - name: url
        value: $(params.repo_url)
      - name: revision
        value: $(params.revision)
      taskRef:
        name: git-clone
      workspaces:
      - name: output
        workspace: source
      - name: basic-auth
        workspace: basic-auth
    
    # [새로운 빌드 태스크]
    - name: build-image
      runAfter:
      - fetch-repository
      taskRef:
        name: buildah
      params:
      - name: IMAGE
        value: $(params.image_url)
      - name: TLSVERIFY
        value: "false" # 내부 레지스트리 사용 시 인증 무시
      workspaces:
      - name: source
        workspace: source
  
    workspaces:
    - name: source
    - name: basic-auth
  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
  - name: basic-auth
    secret:
      secretName: '{{ git_auth_secret }}'